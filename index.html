<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooming Bouquet</title>
  <link rel="stylesheet" href="Lex.css">
</head>
<body>

  <div class="name">
    <h2>Congrats babyyy Lex!!</h2>
  </div>

  <div class="sky">
    <div class="moon"></div>
  </div>

  <div class="bouquet">

    <div class="sway sway1">
      <div class="flower flower1">
        <div class="stem stem1"></div>

        <div class="petal" style="--r:0deg"></div>
        <div class="petal" style="--r:60deg"></div>
        <div class="petal" style="--r:120deg"></div>
        <div class="petal" style="--r:180deg"></div>
        <div class="petal" style="--r:240deg"></div>
        <div class="petal" style="--r:300deg"></div>

        <div class="center"></div>
      </div>
    </div>

    <div class="sway sway2">
      <div class="flower flower2">
        <div class="stem stem2"></div>

        <div class="petal" style="--r:0deg"></div>
        <div class="petal" style="--r:60deg"></div>
        <div class="petal" style="--r:120deg"></div>
        <div class="petal" style="--r:180deg"></div>
        <div class="petal" style="--r:240deg"></div>
        <div class="petal" style="--r:300deg"></div>

        <div class="center"></div>
      </div>
    </div>

    <div class="sway sway3">
      <div class="flower flower3">
        <div class="stem stem3"></div>

        <div class="petal" style="--r:0deg"></div>
        <div class="petal" style="--r:60deg"></div>
        <div class="petal" style="--r:120deg"></div>
        <div class="petal" style="--r:180deg"></div>
        <div class="petal" style="--r:240deg"></div>
        <div class="petal" style="--r:300deg"></div>

        <div class="center"></div>
      </div>
    </div>

  </div>

  <script>
    const sky = document.querySelector('.sky');

    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      star.style.left = `${Math.random() * window.innerWidth}px`;
      star.style.top = `${Math.random() * window.innerHeight}px`;

      sky.appendChild(star);
    }
  </script>

</body>
</html>
